{% extends 'admin/base.html' %}

{% block head_css %}
  {{ super() }}
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body,.navbar,.card,td,th,.form-control{font-family:'Space Grotesk',sans-serif!important}
    .navbar{background:#080C14!important;border-bottom:1px solid rgba(255,255,255,.08)!important}
    .navbar-brand{color:#EAB308!important;font-weight:700!important;letter-spacing:2px;font-size:18px!important}
    .navbar-nav .nav-link{color:#B8C8E8!important}
    .navbar-nav .nav-link:hover{color:#EAB308!important}
    body{background:#0D1220!important;color:#F4F8FF!important}
    .sidebar{background:#080C14!important;border-right:1px solid rgba(255,255,255,.07)!important}
    .sidebar .nav-item a{color:#B8C8E8!important;padding:10px 18px;border-radius:6px;margin:2px 8px;display:block}
    .sidebar .nav-item a:hover,.sidebar .nav-item a.active{background:rgba(234,179,8,.12)!important;color:#EAB308!important}
    .content{background:#0D1220!important}
    .card{background:#111826!important;border:1px solid rgba(255,255,255,.08)!important;border-radius:12px!important}
    .card-header{background:rgba(0,0,0,.3)!important;border-bottom:1px solid rgba(255,255,255,.07)!important;color:#F4F8FF!important;font-weight:700}
    table.table{color:#F4F8FF!important}
    table.table th{background:rgba(0,0,0,.3)!important;color:#B8C8E8!important;border-bottom:1px solid rgba(255,255,255,.1)!important;font-size:12px;letter-spacing:.8px;text-transform:uppercase}
    table.table td{border-color:rgba(255,255,255,.06)!important;vertical-align:middle}
    table.table tr:hover td{background:rgba(255,255,255,.03)!important}
    .btn-primary{background:#EAB308!important;border-color:#EAB308!important;color:#080C14!important;font-weight:700}
    .btn-default,.btn-secondary{background:rgba(255,255,255,.06)!important;border-color:rgba(255,255,255,.1)!important;color:#F4F8FF!important}
    .form-control{background:#060A12!important;border-color:rgba(255,255,255,.1)!important;color:#F4F8FF!important;border-radius:8px!important}
    .form-control:focus{border-color:#EAB308!important;box-shadow:0 0 0 3px rgba(234,179,8,.15)!important}
    .pagination .page-link{background:#111826!important;border-color:rgba(255,255,255,.1)!important;color:#B8C8E8!important}
    .pagination .page-item.active .page-link{background:#EAB308!important;border-color:#EAB308!important;color:#080C14!important}
    .alert-success{background:rgba(74,222,128,.1)!important;border-color:rgba(74,222,128,.2)!important;color:#4ADE80!important}
    .alert-danger{background:rgba(248,113,113,.1)!important;border-color:rgba(248,113,113,.2)!important;color:#F87171!important}
    select.form-control option{background:#111826}
  </style>
{% endblock %}

{% block nav_bar %}
<nav class="navbar navbar-expand-lg">
  <a class="navbar-brand" href="/admin-panel/">⬡ KOBİNET ADMIN</a>
  <ul class="navbar-nav ml-auto d-flex flex-row gap-2">
    <li class="nav-item"><a class="nav-link" href="/admin-panel/dashboard">📊 Dashboard</a></li>
    <li class="nav-item"><a class="nav-link" href="/" target="_blank">🌐 Siteye Git</a></li>
    <li class="nav-item"><a class="nav-link" href="/logout">Çıkış</a></li>
  </ul>
</nav>
{% endblock %}
