{% extends "base.html" %}
{% block robots %}<meta name="robots" content="noindex,nofollow"/>{% endblock %}
{% block title %}Şifremi Unuttum — KOBİNET{% endblock %}
{% block content %}
<div class="wrap-sm" style="padding:56px 20px">
  <div style="text-align:center;margin-bottom:24px">
    <h1 style="font-size:22px;font-weight:600;letter-spacing:-.4px">Şifrenizi mi unuttunuz?</h1>
    <p style="font-size:13.5px;color:var(--gray-600);margin-top:6px">
      Kayıtlı e-posta adresinizi girin, size 1 saat geçerli bir sıfırlama bağlantısı gönderelim.
    </p>
  </div>
  <form method="POST"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <div class="fg">
      <label class="label">E-Posta</label>
      <input class="input" type="email" name="email" placeholder="sirket@ornek.com" required autofocus/>
    </div>
    <button class="btn btn-dark btn-full btn-lg">Sıfırlama Bağlantısı Gönder</button>
  </form>
  <p style="text-align:center;font-size:13px;color:var(--gray-500);margin-top:18px">
    <a href="/login" style="color:var(--gray-700);font-weight:500">← Girişe dön</a>
  </p>
</div>
{% endblock %}
