{% extends "base.html" %}
{% block robots %}<meta name="robots" content="noindex,nofollow"/>{% endblock %}
{% block title %}Yeni Şifre Belirle — KOBİNET{% endblock %}
{% block content %}
<div class="wrap-sm" style="padding:56px 20px">
  <div style="text-align:center;margin-bottom:24px">
    <h1 style="font-size:22px;font-weight:600;letter-spacing:-.4px">Yeni şifre belirleyin</h1>
    <p style="font-size:13.5px;color:var(--gray-600);margin-top:6px">En az 8 karakter olmalıdır.</p>
  </div>
  <form method="POST"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <div class="fg">
      <label class="label">Yeni Şifre</label>
      <input class="input" type="password" name="password" minlength="8" required autofocus/>
    </div>
    <div class="fg">
      <label class="label">Yeni Şifre (Tekrar)</label>
      <input class="input" type="password" name="password2" minlength="8" required/>
    </div>
    <button class="btn btn-dark btn-full btn-lg">Şifreyi Güncelle</button>
  </form>
</div>
{% endblock %}
