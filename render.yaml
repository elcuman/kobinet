services:
  - type: web
    name: kobinet
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: flask db upgrade && flask seed && gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_APP
        value: app.py
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: kobinet-db
          property: connectionString
      - key: ADMIN_EMAIL
        value: admin@kobinet.com
      - key: ADMIN_PASSWORD
        value: admin123
      - key: TELEGRAM_TOKEN
        value: ""
      - key: TELEGRAM_CHAT_ID
        value: ""
      - key: WA_TOKEN
        value: ""
      - key: WA_PHONE_ID
        value: ""
      - key: WA_TO
        value: ""
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        value: ""
      - key: MAIL_PASSWORD
        value: ""

databases:
  - name: kobinet-db
    plan: free
